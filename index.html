<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzia i Michał - 18.04.2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2a4434;
            --accent-gold: #cfa862;
            --bg-color: #fdfcfb;
            --text-main: #333333;
            --text-light: #555555;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.8;
        }

        /* Sekcja powitalna */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(42, 68, 52, 0.6), rgba(42, 68, 52, 0.8)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--accent-gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 4.5rem);
            margin: 0;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .hero p {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 5px;
            margin-top: 15px;
            font-weight: 300;
        }

        /* Kontener główny */
        .container {
            max-width: 800px;
            margin: -40px auto 60px;
            padding: 0 20px;
        }

        /* Pojedyncza karta informacji */
        section {
            background: #ffffff;
            padding: 45px 40px;
            margin-bottom: 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 2rem;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .divider {
            width: 60px;
            height: 2px;
            background-color: var(--accent-gold);
            margin: 0 auto 25px;
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--accent-gold);
            display: block;
            font-weight: 600;
            line-height: 1;
            margin-bottom: 15px;
        }

        p {
            margin: 10px 0;
        }

        .highlight-text {
            color: var(--primary-green);
            font-weight: 600;
            font-size: 1.1rem;
        }
