<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informator Weselny - Zuzia i Michał</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d4c3b; 
            --accent-gold: #c5a059;
            --light-bg: #fdfdfb;
            --white: #ffffff;
            --text-dark: #2c2c2c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background-color: var(--light-bg);
            line-height: 1.8;
        }

        /* Elegancki Header z Tłem */
        .hero {
            height: 50vh;
            background: linear-gradient(rgba(45, 76, 59, 0.4), rgba(45, 76, 59, 0.7)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 6px solid var(--accent-gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            margin: 0;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .container {
            max-width: 850px;
            margin: -50px auto 0; /* Delikatne najechanie na hero */
            padding: 0 20px 60px;
        }

        section {
            background: var(--white);
            padding: 50px 40px;
            margin-bottom: 40px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            text-align: center;
            border-top: 1px solid rgba(197, 160, 89, 0.2);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 2rem;
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 1px;
            background: var(--accent-gold);
            margin: 10px auto 0;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2.5rem; }
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--accent-gold);
            display: block;
            margin-bottom: 5px;
        }

        .highlight {
            color: var(--primary-green);
            font-weight: 600;
        }

        /* Naprawiona Mapa */
        .map-wrapper {
            margin-top: 30px;
            border: 1px solid #eee;
            line-height: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .btn-nav {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 30px;
            background-color: var(--primary-green);
            color: white;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .btn-nav:hover {
            background-color: var(--accent-gold);
            transform: translateY(-2px);
        }

        /* Sekcja Humoru */
        .humor-section {
            background: var(--primary-green);
            color: white;
            padding: 60px 40px;
            border-radius: 4px;
            text-align: center;
        }

        .humor-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent-gold);
        }

        .humor-section p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin: 10px 0;
        }

        .footer-mountains {
            height: 120px;
            background: url('https://i.imgur.com/8N6pYpB.png') repeat-x bottom;
            background-size: contain;
            opacity: 0.15;
            margin-top: 40px;
        }
    </style>
</head>

        <h1>Zuzia & Michał</h1>
        <p>15 Sierpnia 2026</p>
    </header>

            <h2>Ceremonia Zaślubin</h2>

        </section>

            <p>ul. Wrocławska 134B, 58-306 Wałbrzych</p>
