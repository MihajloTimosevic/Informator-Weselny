<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informator Weselny - Zuzia i Michał</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d4c3b; 
            --accent-gold: #c5a059;
            --light-bg: #f9fbf9;
            --text-dark: #2c2c2c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            background-color: var(--light-bg);
            line-height: 1.7;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            margin-bottom: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
        }

        /* Hero Section */
        header {
            padding: 80px 20px;
            background: #fff;
            border-bottom: 5px solid var(--primary-green);
        }

        header h1 { font-size: 3rem; margin: 0; }
        header p { font-size: 1.2rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-gold); font-weight: 600; }

        /* Sekcje */
        section {
            margin-bottom: 60px;
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .highlight {
            color: var(--primary-green);
            font-weight: 600;
        }

        /* Harmonogram */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 30px;
        }

        .event {
            padding: 15px;
            border-left: 3px solid var(--accent-gold);
            background: #fdfdfd;
            text-align: left;
            margin-left: 20px;
        }

        .time {
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--primary-green);
            display: block;
        }

        /* Mapa */
        .map-container {
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        /* Stopka z humorem */
        .humor-box {
            font-style: italic;
            background: var(--primary-green);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
        }

        .humor-box p { margin: 5px 0; }

        .btn-map {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background: var(--primary-green);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
