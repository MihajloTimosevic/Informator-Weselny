<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informator Weselny - Zuzia i Michał</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2d4c3b; 
            --accent-gold: #c5a059;
            --bg-light: #fdfdfb;
            --white: #ffffff;
            --text: #2c2c2c;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg-light);
            color: var(--text);
            line-height: 1.8;
        }

        /* Nagłówek z klimatycznym tłem */
        .hero {
            height: 60vh;
            background: linear-gradient(rgba(45, 76, 59, 0.5), rgba(45, 76, 59, 0.8)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 6px solid var(--accent-gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .hero p {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .container {
            max-width: 800px;
            margin: -60px auto 40px;
            padding: 0 20px;
        }

        section {
            background: var(--white);
            padding: 40px;
            margin-bottom: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--accent-gold);
            display: inline-block;
            padding-bottom: 5px;
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--accent-gold);
            display: block;
            font-weight: 700;
        }

        .address {
            font-style: normal;
            margin-top: 10px;
            display: block;
            color: #555;
        }

        /* Mapa - Fix */
        .map-container {
            margin: 25px 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
            padding-bottom: 56.25%; /* Proporcje 16:9 */
            height: 0;
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .btn-nav {
            display: inline-block;
            padding: 12px 25px;
            background: var(--primary-green);
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-nav:hover { background: var(--accent-gold); }

        .highlight-box {
            background-color: var(--primary-green);
            color: white;
            padding: 40px;
            border-radius: 8px;
            margin-top: 40px;
        }

        .highlight-box h3 {
            font-family: 'Playfair Display', serif;
            color: var(--accent-gold);
            font-size: 1.6rem;
        }

        .footer-note {
            font-size: 0.9rem;
            color: #888;
            margin-top: 40px;
            text-align: center;
