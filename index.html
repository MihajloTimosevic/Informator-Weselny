<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzia i Michał - 18 Kwietnia 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #2a4434; /* Butelkowa zieleń */
            --accent-gold: #cfa862; /* Szlachetne złoto */
            --text-main: #333333;
            --text-light: #555555;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            /* Tło: mglisty, bardzo jasny górski odcień (zamiast czystej bieli) */
            background: linear-gradient(135deg, #eff3f1 0%, #e4e9e6 100%);
            color: var(--text-main);
            line-height: 1.8;
            min-height: 100vh;
        }

        /* Sekcja powitalna (Hero) */
        .hero {
            height: 65vh;
            background: linear-gradient(rgba(42, 68, 52, 0.5), rgba(42, 68, 52, 0.85)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            border-bottom: 5px solid var(--accent-gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.2rem, 8vw, 5rem);
            margin: 0;
            font-weight: 400;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .hero p {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 5px;
            margin-top: 15px;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* Kontener i Karty */
        .container {
            max-width: 800px;
            margin: -50px auto 60px;
            padding: 0 20px;
        }

        section {
            background: #ffffff;
            padding: 45px 40px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(42, 68, 52, 0.08); /* Lekki zielony cień */
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 2.2rem;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .divider {
            width: 60px;
            height: 2px;
            background-color: var(--accent-gold);
            margin: 0 auto 25px;
        }

        .time {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: var(--accent-gold);
            display: block;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 10px;
        }

        .highlight-text {
            color: var(--primary-green);
            font-weight: 600;
            font-size: 1.15rem;
        }

        /* Mapa Google (Kuloodporny format) */
        .map-container {
            margin: 30px 0 20px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eaeaea;
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Przyciski */
        .btn {
            display: inline-block;
            padding: 15px 35px;
            background: var(--primary-green);
            color: white !important;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(42, 68, 52, 0.2);
        }

        .btn:hover { 
            background: var(--accent-gold); 
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(207, 168, 98, 0.3);
        }

        /* Harmonogram boxy */
        .schedule-row {
            margin: 25px 0;
        }

        .surprise-box {
            background-color: #f8fbf9;
            padding: 25px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-gold);
            margin-top: 35px;
            font-style: italic;
            color: var(--text-light);
        }

        /* Prezent box (wyróżniony na dole) */
        .gift-box {
            background: linear-gradient(135deg, var(--primary-green), #1b2e23);
            color: white;
            padding: 60px 40px;
            border-radius: 12px;
            margin-top: 50px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(42, 68, 52, 0.2);
        }
