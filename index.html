<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuzia i Michał - Informator</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #1b3022;
            --gold: #c5a059;
            --white: #ffffff;
            --bg: #f4f7f5;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #333;
            line-height: 1.6;
        }

        /* Sekcja tła - Góry */
        .hero {
            height: 65vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            border-bottom: 5px solid var(--gold);
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 10vw, 5rem);
            margin: 0;
            font-weight: 400;
        }

        .hero p {
            font-size: 1.2rem;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .wrapper {
            max-width: 800px;
            margin: -50px auto 50px;
            padding: 0 20px;
        }

        .card {
            background: var(--white);
            padding: 40px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--dark-green);
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .time-badge {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: var(--gold);
            display: block;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .address-box {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        /* Map Fix */
        .map-frame {
            width: 100%;
            height: 400px;
            border: 0;
            border-radius: 8px;
            margin-top: 20px;
        }

        .btn-nav {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background: var(--dark-green);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-nav:hover {
            background: var(--gold);
        }

        /* Harmonogram */
        .plan-item {
            padding: 20px 0;
            border-bottom: 1px dashed #ddd;
        }

        .plan-item:last-child { border: none; }

        .surprise-box {
            background: #fff9eb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ffe4a3;
            margin-top: 20px;
            font-style: italic;
        }

        /* Sekcja Humoru na dole */
        .humor-footer {
            background: var(--dark-green);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-radius: 12px;
        }

        .humor-footer h3 {
            color: var(--gold);
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <header class="hero">
        <h1>Zuzia & Michał</h1>
        <p>15.08.2026</p>
    </header>

    <div class="wrapper">
        
        <section class="card">
            <h2>Ceremonia Zaślubin</h2>
            <span class="time-badge">16:00</span>
            <div class="address-box">
                <strong>Parafia św. Jerzego i Matki Bożej Różańcowej</strong><br>
                ul. Świętego Jerzego 4, 58-304 Wałbrzych
            </div>
        </section>

        <section class="card">
            <h2>Wesele</h2>
            <div class="address-box">
                Uroczystość odbędzie się w <strong>Hotelu Maria</strong><br>
                ul. Wrocławska 134B, 58-306 Wałbrzych
            </div>
